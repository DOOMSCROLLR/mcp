name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      MCP_REGISTRY_PRIVATE_KEY: ${{ secrets.MCP_REGISTRY_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Read package version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Check if npm version already published
        id: npm_check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=${{ steps.pkg.outputs.version }}
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${NAME}@${VERSION} already on npm — skipping npm publish"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "${NAME}@${VERSION} not on npm — will publish"
          fi

      - name: Publish to npm
        id: npm_publish
        if: steps.npm_check.outputs.published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::notice::NPM_TOKEN is not configured; skipping npm publish."
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "skipped_missing_token=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if npm publish --access public --provenance; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "skipped_missing_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::npm publish failed. Check that NPM_TOKEN exists, is not expired, and has publish rights for @doomscrollr/mcp-server. Continuing so the workflow reports the package as blocked instead of failing the whole run."
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "skipped_missing_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read server.json version
        id: server
        if: steps.npm_check.outputs.published == 'true' || steps.npm_publish.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./server.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Registry version: $VERSION"

      - name: Install mcp-publisher
        if: steps.npm_check.outputs.published == 'true' || steps.npm_publish.outputs.published == 'true'
        run: |
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
          esac
          URL="https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${OS}_${ARCH}.tar.gz"
          echo "Downloading $URL"
          curl -fL "$URL" -o /tmp/mcp-publisher.tar.gz
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp mcp-publisher
          sudo mv /tmp/mcp-publisher /usr/local/bin/mcp-publisher
          mcp-publisher --version || true

      - name: Validate registry metadata
        if: steps.npm_check.outputs.published == 'true' || steps.npm_publish.outputs.published == 'true'
        run: mcp-publisher validate

      - name: Check if registry version already published
        id: reg_check
        if: steps.npm_check.outputs.published == 'true' || steps.npm_publish.outputs.published == 'true'
        run: |
          VERSION=${{ steps.server.outputs.version }}
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://registry.modelcontextprotocol.io/v0/servers?search=com.doomscrollr/mcp")
          if curl -s "https://registry.modelcontextprotocol.io/v0/servers?search=com.doomscrollr/mcp" | grep -q "\"version\":\"$VERSION\""; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "com.doomscrollr/mcp@$VERSION already in registry — skipping"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "com.doomscrollr/mcp@$VERSION not in registry — will publish"
          fi

      - name: Publish to MCP Registry
        if: (steps.npm_check.outputs.published == 'true' || steps.npm_publish.outputs.published == 'true') && steps.reg_check.outputs.published == 'false' && env.MCP_REGISTRY_PRIVATE_KEY != ''
        env:
          MCP_REGISTRY_PRIVATE_KEY: ${{ secrets.MCP_REGISTRY_PRIVATE_KEY }}
        run: |
          mcp-publisher login dns --domain doomscrollr.com --private-key "$MCP_REGISTRY_PRIVATE_KEY"
          mcp-publisher publish

      - name: Skip MCP Registry publish when registry key is missing
        if: (steps.npm_check.outputs.published == 'true' || steps.npm_publish.outputs.published == 'true') && steps.reg_check.outputs.published == 'false' && env.MCP_REGISTRY_PRIVATE_KEY == ''
        env:
          MCP_REGISTRY_PRIVATE_KEY: ${{ secrets.MCP_REGISTRY_PRIVATE_KEY }}
        run: echo "MCP_REGISTRY_PRIVATE_KEY is not configured; npm publish can still complete."

      - name: Summary
        if: always()
        run: |
          echo "### MCP publish summary" >> $GITHUB_STEP_SUMMARY
          echo "- npm @doomscrollr/mcp-server@${{ steps.pkg.outputs.version }} — already_published=${{ steps.npm_check.outputs.published }}, published_now=${{ steps.npm_publish.outputs.published }}, skipped_missing_token=${{ steps.npm_publish.outputs.skipped_missing_token }}" >> $GITHUB_STEP_SUMMARY
          echo "- registry com.doomscrollr/mcp@${{ steps.server.outputs.version }} — already_published=${{ steps.reg_check.outputs.published }}" >> $GITHUB_STEP_SUMMARY
