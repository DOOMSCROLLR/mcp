<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DOOMSCROLLR Product Card</title><style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap');*{box-sizing:border-box}body{margin:0;background:#fff;color:#000;font-family:'JetBrains Mono',monospace}.card{width:706px;max-width:100%;background:#fff;padding:36px}.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}.logo{width:402px;max-width:62%;height:auto}.pill{background:#000;color:#fff;padding:12px 18px;font-size:15px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}.hero{width:100%;height:440px;object-fit:cover;background:#f1f1f1;margin-bottom:28px}.row{display:flex;align-items:flex-start;gap:18px}.name{font-size:42px;line-height:1.2;letter-spacing:.02em;text-transform:uppercase;font-weight:800;flex:1}.price{font-size:42px;line-height:1.2;color:#0662FF;font-weight:800}.subtitle{font-size:22px;line-height:1.35;color:#91919e;text-transform:uppercase;letter-spacing:.08em;margin-top:28px}.status{display:flex;align-items:center;gap:14px;margin-top:28px;font-size:20px;letter-spacing:.08em;text-transform:uppercase;font-weight:800}.dot{width:16px;height:16px;background:#13c768;display:inline-block;border-radius:50%}.spacer{flex:1}.cta{background:#0662FF;color:#000;padding:14px 20px;font-size:20px;letter-spacing:.08em;text-transform:uppercase;font-weight:800}
</style></head><body><main class="card"><header class="header"><img class="logo" src="https://doomscrollr.com/images/doomscrollr-logo-new.png" alt="DOOMSCROLLR"><div class="pill">Product</div></header><img class="hero" id="hero" alt="Product image"><div class="row"><div class="name" id="name">Tie Dye Pants</div><div class="price" id="price">$50</div></div><div class="subtitle" id="subtitle">Created from photo · 1 variant · unlimited stock</div><footer class="status"><span class="dot"></span><span>Live in your shop</span><span class="spacer"></span><span class="cta">Open</span></footer></main><script>
const meta=window.openai?.toolResponseMetadata||{}; const r=meta.result||window.openai?.toolOutput||{}; const product=r.product||r;
const title=product.title||'Tie Dye Pants'; const price=Number(product.price??50); const img=product.cover_photo_url||product.image||'https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?auto=format&fit=crop&w=900&q=80';
const variants=Array.isArray(product.variants)?product.variants.length:(product.variant_options?1:1); const stock=product.inventory_count ?? (Array.isArray(product.variants)?product.variants.reduce((s,v)=>s+(Number(v.inventory_count)||0),0):'unlimited');
document.getElementById('hero').src=img; document.getElementById('name').textContent=String(title).toUpperCase(); document.getElementById('price').textContent=`$${price.toFixed(price%1?2:0)}`; document.getElementById('subtitle').textContent=`CREATED FROM PHOTO · ${variants} VARIANT${variants===1?'':'S'} · ${String(stock).toUpperCase()} STOCK`;
</script></body></html>
