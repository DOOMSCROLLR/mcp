<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DOOMSCROLLR Style Card</title><style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap');*{box-sizing:border-box}body{margin:0;background:#fff;color:#000;font-family:'JetBrains Mono',monospace}.card{width:706px;max-width:100%;background:#fff;padding:36px}.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}.logo{width:402px;max-width:62%;height:auto}.pill{background:#000;color:#fff;padding:12px 18px;font-size:15px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}.title{font-size:42px;line-height:1.34;letter-spacing:.02em;text-transform:uppercase;font-weight:800;margin:0 0 28px}.panels{display:grid;grid-template-columns:1fr 1fr;gap:12px}.panel{height:400px;padding:28px;position:relative}.before{background:#0662FF}.after{background:#eadfce;color:#352d29}.word{font-size:27px;letter-spacing:.08em;font-weight:800}.label{position:absolute;bottom:30px;left:28px;font-size:19px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;color:#fff}.after .label{color:#000}.subtitle{font-size:22px;line-height:1.35;color:#91919e;text-transform:uppercase;letter-spacing:.08em;margin-top:28px}.status{display:flex;align-items:center;gap:14px;margin-top:28px;font-size:20px;letter-spacing:.08em;text-transform:uppercase;font-weight:800}.dot{width:16px;height:16px;background:#13c768;display:inline-block;border-radius:50%}.spacer{flex:1}.cta{background:#DBFE00;color:#000;padding:14px 20px;font-size:20px;letter-spacing:.08em;text-transform:uppercase;font-weight:800}
</style></head><body><main class="card"><header class="header"><img class="logo" src="https://doomscrollr.com/images/doomscrollr-logo-new.png" alt="DOOMSCROLLR"><div class="pill">Style</div></header><h1 class="title" id="title">New Look · Skims-Inspired</h1><section class="panels"><div class="panel before"><img src="https://doomscrollr.com/images/doomscrollr-logo-new.png" alt="Before" style="width:190px"><div class="label">Before</div></div><div class="panel after"><div class="word">doomscrollr</div><div class="label">After</div></div></section><div class="subtitle" id="subtitle">Neutral palette · serif headlines</div><footer class="status"><span class="dot"></span><span>Applied · Live now</span><span class="spacer"></span><span class="cta">Undo</span></footer></main><script>

</script></body></html>
