<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DOOMSCROLLR Analytics Card</title><style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap');*{box-sizing:border-box}body{margin:0;background:#fff;color:#000;font-family:'JetBrains Mono',monospace}.card{width:706px;max-width:100%;background:#fff;padding:36px}.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px}.logo{width:402px;max-width:62%;height:auto}.pill{background:#000;color:#fff;padding:12px 18px;font-size:15px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}.title{font-size:42px;line-height:1.34;letter-spacing:.02em;text-transform:uppercase;font-weight:800;margin:0 0 28px}.list{display:grid;gap:24px}.row{display:grid;grid-template-columns:42px 1fr 92px 28px;gap:2px;align-items:center;font-size:24px;font-weight:800}.rank{color:#91919e}.likes{color:#0662FF;text-align:right}.bar{grid-column:2/4;height:2px;background:#0662FF;margin-top:12px}.footer{display:flex;align-items:center;margin-top:28px;font-size:20px;letter-spacing:.08em;text-transform:uppercase;font-weight:800}.spacer{flex:1}.cta{background:#DBFE00;color:#000;padding:14px 20px;font-size:20px;letter-spacing:.08em;text-transform:uppercase;font-weight:800}
</style></head><body><main class="card"><header class="header"><img class="logo" src="https://doomscrollr.com/images/doomscrollr-logo-new.png" alt="DOOMSCROLLR"><div class="pill">Analytics</div></header><h1 class="title" id="title">Top Posts<br>Last 7 Days</h1><section class="list" id="list"></section><footer class="footer"><span id="total">Total likes · 1,170</span><span class="spacer"></span><span class="cta">Open Analytics</span></footer></main><script>
const meta=window.openai?.toolResponseMetadata||{}; const r=meta.result||window.openai?.toolOutput||{}; const days=r.days||7;
const posts=(Array.isArray(r.top_posts)&&r.top_posts.length?r.top_posts:[
{title:'Sunday drop drops Friday',likes:412},{title:'New campaign w/ @dani',likes:286},{title:'BTS – studio cut #4',likes:197},{title:'Color story 002',likes:154},{title:'Restocked: black tee',likes:121}
]).slice(0,5); const max=Math.max(...posts.map(p=>Number(p.likes)||0),1); const total=r.total_likes??posts.reduce((s,p)=>s+(Number(p.likes)||0),0);
document.getElementById('title').innerHTML=`TOP POSTS<br>LAST ${days} DAYS`; document.getElementById('total').textContent=`TOTAL LIKES · ${Number(total).toLocaleString()}`;
document.getElementById('list').innerHTML=posts.map((p,i)=>`<div class="row"><div class="rank">#${i+1}</div><div>${String(p.title||'Untitled post')}</div><div class="likes">${Number(p.likes||0).toLocaleString()}</div><div>♥</div><div class="bar" style="width:${Math.max(30,(Number(p.likes)||0)/max*100)}%"></div></div>`).join('');
</script></body></html>
