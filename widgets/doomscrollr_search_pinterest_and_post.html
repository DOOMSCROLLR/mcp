<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DOOMSCROLLR Pinterest Card</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap');
    *{box-sizing:border-box} body{margin:0;background:#fff;color:#000;font-family:'JetBrains Mono',monospace}.card{width:706px;max-width:100%;background:#fff;padding:28px}.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px}.logo{width:402px;max-width:62%;height:auto}.pill{background:#000;color:#fff;padding:12px 18px;font-size:15px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}.title{font-size:42px;line-height:1.34;letter-spacing:.02em;text-transform:uppercase;font-weight:800;margin:0 0 18px}.subtitle{font-size:22px;line-height:1.35;color:#91919e;text-transform:uppercase;letter-spacing:.08em}.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:18px}.thumb{width:100%;aspect-ratio:1/1;object-fit:cover;background:#eee}.status{display:flex;align-items:center;gap:14px;margin-top:28px;font-size:20px;letter-spacing:.08em;text-transform:uppercase;font-weight:800}.dot{width:16px;height:16px;background:#13c768;display:inline-block;border-radius:50%}.spacer{flex:1}.cta{background:#DBFE00;color:#000;padding:14px 20px;font-size:20px;letter-spacing:.08em;text-transform:uppercase;font-weight:800}
  </style>
</head>
<body>
  <main class="card">
    <header class="header"><img class="logo" src="https://doomscrollr.com/images/doomscrollr-logo-new.png" alt="DOOMSCROLLR"><div class="pill">Pinterest</div></header>
    <h1 class="title" id="title">AIR-COOLED PORSCHE</h1>
    <div class="subtitle" id="subtitle">12 PINS FOUND · 4 ADDED TO YOUR SITE</div>
    <section class="grid" id="grid"></section>
    <footer class="status"><span class="dot"></span><span>Posted as drafts</span><span class="spacer"></span><span class="cta">Review</span></footer>
  </main>
  <script>
    const fallbackImages = [
      'https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=600&q=80',
      'https://images.unsplash.com/photo-1503736334956-4c8f8e92946d?auto=format&fit=crop&w=600&q=80',
      'https://images.unsplash.com/photo-1542362567-b07e54358753?auto=format&fit=crop&w=600&q=80',
      'https://images.unsplash.com/photo-1511919884226-fd3cad34687c?auto=format&fit=crop&w=600&q=80'
    ];
    const meta = window.openai?.toolResponseMetadata || {};
    const result = meta.result || window.openai?.toolOutput || { query:'air-cooled Porsche', pins:[], posts:[], created:4 };
    const query = String(result.query || 'air-cooled Porsche').toUpperCase();
    const pins = Array.isArray(result.pins) ? result.pins : [];
    const posts = Array.isArray(result.posts) ? result.posts : [];
    const created = result.created ?? posts.length ?? 4;
    const found = pins.length || Math.max(created, 4) * 3;
    document.getElementById('title').textContent = query;
    document.getElementById('subtitle').textContent = `${found} PINS FOUND · ${created} ADDED TO YOUR SITE`;
    const images = [...pins.map(p=>p.image_url).filter(Boolean), ...posts.map(p=>p.image || p.image_url).filter(Boolean), ...fallbackImages].slice(0,4);
    document.getElementById('grid').innerHTML = images.map(src => `<img class="thumb" src="${src}" alt="Pinterest result">`).join('');
  </script>
</body>
</html>
